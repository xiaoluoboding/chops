name: Chops
options:
  bundleIdPrefix: com.joshpigford
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

configs:
  Debug: debug
  Release: release
  LocalRelease: release

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
  ACP:
    url: https://github.com/wiedymi/swift-acp
    branch: main
  Highlightr:
    url: https://github.com/raspu/Highlightr
    from: "2.2.1"
  cmark-gfm:
    url: https://github.com/brokenhandsio/cmark-gfm.git
    from: "2.1.0"

targets:
  Chops:
    type: application
    platform: macOS
    sources:
      - path: Chops
        excludes:
          - "*.entitlements"
          - Info.plist
    dependencies:
      - package: Sparkle
      - package: Highlightr
      - package: cmark-gfm
        product: cmark
      - package: ACP
        product: ACP
      - package: ACP
        product: ACPModel
      - package: ACP
        product: ACPRegistry
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.joshpigford.Chops
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_FILE: Chops/Info.plist
        CODE_SIGN_ENTITLEMENTS: Chops/Chops.entitlements
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_STRICT_CONCURRENCY: minimal
        ASSETCATALOG_COMPILER_APPICON_NAME: ChopsIcon
        ENABLE_HARDENED_RUNTIME: YES
      configs:
        Release:
          CODE_SIGN_IDENTITY: "Developer ID Application"
        LocalRelease:
          CODE_SIGN_ENTITLEMENTS: Chops/ChopsLocalRelease.entitlements
